{% extends "base.html" %}

{% block content %}
  <h1>{{ section.title }}</h1>

  <ul>
    {% for page in section.pages %}
      <li>
        <a href="{{ page.permalink }}">{{ page.title }}</a>
        {% if page.date %} – {{ page.date }}{% endif %}
      </li>
    {% endfor %}
  </ul>

  <div>
    {{ section.content | safe }}
  </div>
{% endblock content %}
