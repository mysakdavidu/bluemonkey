<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ config.title }}{% endblock title %}</title>
  <link rel="stylesheet" href="/css/tailwind-style.css">
  <script defer src="/js/alpine.min.js"></script>
</head>
<body class="min-h-screen bg-brand-indigo text-brand-ink">
  <header class="sticky top-0 z-50 border-b border-white/20 bg-[linear-gradient(90deg,#1d2347_0%,#2b2968_38%,#35319a_100%)] shadow-[0_1px_0_rgba(120,142,240,0.18)]">
    <div class="page-shell flex items-start gap-3 py-3 md:flex-row md:items-center md:justify-between">
      <a class="shrink-0 text-brand-blue no-underline transition hover:text-brand-yellow" href="/">
        <img class="block h-auto w-[clamp(52px,12vw,72px)] object-contain md:w-[clamp(38px,4vw,56px)]" src="/img/logo.png" alt="" width="56" height="36" decoding="async">
      </a>
      <div class="flex min-w-0 flex-1 flex-col gap-2 md:flex-row md:items-center md:justify-between md:gap-4">
        <a class="inline-flex min-w-0 items-center gap-2 text-brand-blue no-underline transition hover:text-brand-yellow" href="/">
          <span class="inline-flex flex-col font-display text-[clamp(0.92rem,1.45vw,1.5rem)] leading-none uppercase tracking-[0.72px] text-brand-blue"><span>Blue</span><span>Monkey</span></span>
          <img class="block h-auto w-[clamp(36px,5vw,72px)] shrink-0 object-contain drop-shadow-[0_2px_10px_rgba(0,0,0,0.25)]" src="/img/badge.png" alt="Rock a pop, 100 % živě" width="132" height="132" decoding="async">
        </a>
        <nav class="flex flex-wrap items-center gap-x-3 gap-y-2 md:flex-nowrap md:gap-4">
          <a class="font-barlow text-sm font-semibold tracking-[0.01em] text-brand-paper no-underline transition hover:text-brand-yellow md:text-base" href="/#koncerty">Koncerty</a>
          <a class="font-barlow text-sm font-semibold tracking-[0.01em] text-brand-paper no-underline transition hover:text-brand-yellow md:text-base" href="/#playlist">Playlist</a>
          <a class="font-barlow text-sm font-semibold tracking-[0.01em] text-brand-paper no-underline transition hover:text-brand-yellow md:text-base" href="/#kapela">Kapela</a>
          <a class="font-barlow text-sm font-semibold tracking-[0.01em] text-brand-paper no-underline transition hover:text-brand-yellow md:text-base" href="/#kontakt">Kontakt</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="page-shell pb-6 md:pb-8">
    {% block content %}{% endblock content %}
  </main>

  <script>
    document.addEventListener("click", function (event) {
      const trigger = event.target.closest("[data-youtube-id]");
      if (!trigger) {
        return;
      }

      const videoId = trigger.getAttribute("data-youtube-id");
      if (!videoId) {
        return;
      }

      const iframe = document.createElement("iframe");
      iframe.src = "https://www.youtube-nocookie.com/embed/" + encodeURIComponent(videoId) + "?autoplay=1&rel=0";
      iframe.title = "YouTube video player";
      iframe.loading = "lazy";
      iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";
      iframe.allowFullscreen = true;

      const wrapper = document.createElement("div");
      wrapper.className = "content-video-embed";
      wrapper.appendChild(iframe);

      trigger.replaceWith(wrapper);
    });
  </script>
</body>
</html>
